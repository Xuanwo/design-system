<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { padding: 22px 24px; font-family: var(--font-sans); background: var(--bg); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 22px; align-items: start; }
  .glabel { font-size: 11px; letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--fg-subtle); font-weight: 600; margin: 4px 0 12px; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Textarea, Select, Checkbox, Switch } = window.XuanwoDesignSystem_8e9a9d;
const search = <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><circle cx="7" cy="7" r="4.5"/><path d="m11 11 3 3"/></svg>;

function Demo() {
  return (
    <div className="grid">
      <div className="stack">
        <Input label="Email" type="email" placeholder="you@example.com" defaultValue="hello@example.com" />
        <Input prefix={search} placeholder="Search posts…" />
        <Input label="Slug" error="Already taken" defaultValue="opendal" />
        <Select label="Theme" options={["System","Light","Dark"]} defaultValue="System" />
      </div>
      <div className="stack">
        <Textarea label="Abstract" rows={3} defaultValue="Notes on storage and async Rust." />
        <div className="glabel" style={{margin:'2px 0 4px'}}>Choice</div>
        <Checkbox label="Subscribe to the newsletter" defaultChecked />
        <Checkbox label="Public" description="Anyone with the link can read." />
        <Switch label="Dark mode" defaultChecked />
        <Switch label="Comments" size="sm" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
