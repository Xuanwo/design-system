<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { padding: 22px 24px; font-family: var(--font-sans); background: var(--bg); }
  .glabel { font-size: 11px; letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--fg-subtle); font-weight: 600; margin: 0 0 26px; }
  .row { display: flex; gap: 30px; align-items: center; margin-bottom: 26px; }
  .force .xw-tt { opacity: 1 !important; transform: none !important; }
  .stage { position: relative; height: 220px; border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; background: var(--surface-2); }
  .stage .xw-dialog__backdrop { position: absolute !important; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Tooltip, Dialog, Button, IconButton } = window.XuanwoDesignSystem_8e9a9d;
const link = <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M6.5 9.5 9.5 6.5M7 4.5 8.5 3a2.5 2.5 0 0 1 3.5 3.5L10.5 8M9 11.5 7.5 13A2.5 2.5 0 0 1 4 9.5L5.5 8"/></svg>;
function Demo() {
  return (
    <React.Fragment>
      <div className="glabel">Tooltip (shown open) · side variants</div>
      <div className="row force">
        <Tooltip content="Copy link" kbd="⌘C"><IconButton label="Copy">{link}</IconButton></Tooltip>
        <Tooltip content="Bottom" side="bottom"><Button variant="secondary" size="sm">Bottom</Button></Tooltip>
        <Tooltip content="Right side" side="right"><Button variant="secondary" size="sm">Right</Button></Tooltip>
      </div>
      <div className="glabel" style={{marginBottom:10}}>Dialog</div>
      <div className="stage">
        <Dialog open onClose={()=>{}} title="Delete post?" description="This action can't be undone."
          footer={<React.Fragment><Button variant="ghost">Cancel</Button><Button variant="danger">Delete</Button></React.Fragment>}>
          <p style={{fontSize:'var(--text-base)', color:'var(--fg-muted)', lineHeight:1.5}}>
            “Building OpenDAL” and its 12 comments will be permanently removed.
          </p>
        </Dialog>
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
