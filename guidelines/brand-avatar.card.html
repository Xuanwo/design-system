<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px 28px; font-family: var(--font-sans); display: flex; gap: 32px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); }
  img { display: block; object-fit: cover; border: 1px solid var(--border); background: #fff; }
  .rounded { border-radius: var(--radius-lg); }
  .circle { border-radius: var(--radius-full); }
  .square { border-radius: var(--radius-sm); }
  .note { font-size: var(--text-sm); color: var(--fg-subtle); max-width: 230px; line-height: var(--leading-relaxed); margin-left: auto; }
  .note b { color: var(--fg); font-weight: 600; }
</style>
</head>
<body>
  <div class="item"><img class="rounded" src="../assets/logo/logo.jpeg" width="116" height="116" alt="Xuanwo logo"><span class="px">rounded · 116</span></div>
  <div class="item"><img class="circle" src="../assets/logo/logo.jpeg" width="72" height="72" alt=""><span class="px">circle · 72</span></div>
  <div class="item"><img class="square" src="../assets/logo/logo.jpeg" width="44" height="44" alt=""><span class="px">avatar · 44</span></div>
  <p class="note">The personal mark — a pixel-art border collie at the keyboard with a <b>漩涡</b> vortex behind it. Use as the brand <b>avatar</b> (rounded for product, circle for people). Keep on white; pair the line <b>vortex mark</b> as the secondary glyph.</p>
</body>
</html>
