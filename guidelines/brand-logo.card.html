<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 28px 32px; font-family: var(--font-sans); display: flex; flex-direction: column; gap: 18px; justify-content: center; align-items: flex-start; }
  .wordmark { height: 84px; width: auto; display: block; }
  .note { font-size: var(--text-sm); color: var(--fg-subtle); line-height: var(--leading-relaxed); max-width: 560px; }
  .note b { color: var(--fg); font-weight: 600; }
</style>
</head>
<body>
  <img class="wordmark" src="../assets/logo/wordmark.png" alt="Xuanwo">
  <p class="note">The primary <b>wordmark</b> — the “X” is the border-collie face, flanked by a monitor and a motion tail. Use it in headers, footers, and title areas. Keep it on <b>light</b> surfaces; don’t recolor or stretch.</p>
</body>
</html>
