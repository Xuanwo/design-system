<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing scale" subtitle="8px grid with 4px half-steps." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 18px 26px; font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 14px; padding: 2px 0; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); width: 96px; flex: none; }
  .bar { height: 14px; background: var(--accent); border-radius: var(--radius-xs); }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-faint); }
</style>
</head>
<body>
  <div class="row"><span class="name">--space-1</span><span class="bar" style="width:4px"></span><span class="px">4</span></div>
  <div class="row"><span class="name">--space-2</span><span class="bar" style="width:8px"></span><span class="px">8</span></div>
  <div class="row"><span class="name">--space-3</span><span class="bar" style="width:12px"></span><span class="px">12</span></div>
  <div class="row"><span class="name">--space-4</span><span class="bar" style="width:16px"></span><span class="px">16</span></div>
  <div class="row"><span class="name">--space-5</span><span class="bar" style="width:24px"></span><span class="px">24</span></div>
  <div class="row"><span class="name">--space-6</span><span class="bar" style="width:32px"></span><span class="px">32</span></div>
  <div class="row"><span class="name">--space-7</span><span class="bar" style="width:48px"></span><span class="px">48</span></div>
  <div class="row"><span class="name">--space-8</span><span class="bar" style="width:64px"></span><span class="px">64</span></div>
  <div class="row"><span class="name">--space-9</span><span class="bar" style="width:96px"></span><span class="px">96</span></div>
</body>
</html>
