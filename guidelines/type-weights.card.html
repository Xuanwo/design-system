<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px 26px; font-family: var(--font-sans); display: grid; grid-template-columns: repeat(4,1fr); gap: 18px; }
  .col { }
  .big { font-size: var(--text-2xl); color: var(--fg); line-height: 1.2; }
  .cn { font-size: var(--text-lg); color: var(--fg-muted); margin-top: 4px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); margin-top: 8px; }
</style>
</head>
<body>
  <div class="col"><div class="big" style="font-weight:400">Aa</div><div class="cn" style="font-weight:400">漩涡</div><div class="lbl">400 regular</div></div>
  <div class="col"><div class="big" style="font-weight:500">Aa</div><div class="cn" style="font-weight:500">漩涡</div><div class="lbl">500 medium</div></div>
  <div class="col"><div class="big" style="font-weight:600">Aa</div><div class="cn" style="font-weight:700">漩涡</div><div class="lbl">600 semibold</div></div>
  <div class="col"><div class="big" style="font-weight:700">Aa</div><div class="cn" style="font-weight:700">漩涡</div><div class="lbl">700 bold</div></div>
</body>
</html>
