<!-- @dsCard group="Brand" viewport="700x190" name="X monogram — sizes & clearspace" subtitle="The dog-face X for tight spaces, favicons, avatars. Min 16px." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px 28px; font-family: var(--font-sans); display: flex; gap: 34px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); }
  img { display: block; }
  .clear { padding: 16px; border: 1px dashed var(--border-strong); border-radius: var(--radius-md); }
  .note { font-size: var(--text-sm); color: var(--fg-subtle); max-width: 210px; line-height: var(--leading-relaxed); margin-left: auto; }
</style>
</head>
<body>
  <div class="item"><img src="../assets/logo/monogram.png" width="64" height="64" alt="X"><span class="px">64</span></div>
  <div class="item"><img src="../assets/logo/monogram.png" width="40" height="40" alt=""><span class="px">40</span></div>
  <div class="item"><img src="../assets/logo/monogram.png" width="24" height="24" alt=""><span class="px">24</span></div>
  <div class="item"><img src="../assets/logo/monogram.png" width="16" height="16" alt=""><span class="px">16 min</span></div>
  <div class="item"><div class="clear"><img src="../assets/logo/monogram.png" width="44" height="44" alt=""></div><span class="px">clearspace</span></div>
  <p class="note">The standalone <b style="color:var(--fg)">X</b> monogram — the border-collie face. Use where the full wordmark won’t fit: compact bars, favicons, avatars.</p>
</body>
</html>
