<!-- @dsCard group="Type" viewport="700x230" name="Display & headings" subtitle="Source Serif 4 for display, Source Sans 3 for headings." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px 26px; font-family: var(--font-sans); }
  .display { font-family: var(--font-display); font-size: var(--text-4xl); font-weight: 600; line-height: var(--leading-tight); letter-spacing: var(--tracking-tight); color: var(--fg); }
  .eyebrow { font-size: var(--text-sm); letter-spacing: var(--tracking-wide); text-transform: uppercase; color: var(--accent-text); font-weight: 600; margin-bottom: 6px; }
  h2 { font-size: var(--text-2xl); margin-top: 18px; }
  h3 { font-size: var(--text-xl); margin-top: 8px; color: var(--fg-muted); font-weight: 600; }
  .meta { margin-top: 8px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); }
</style>
</head>
<body>
  <div class="eyebrow">Display · Serif</div>
  <div class="display">Ideas, explained calmly.</div>
  <h2>Section heading — Source Sans 3</h2>
  <h3>Subheading / 副标题</h3>
  <div class="meta">--font-display (serif) · --font-heading (sans) · tracking-tight</div>
</body>
</html>
