<!-- @dsCard group="Spacing" viewport="700x180" name="Borders & layering" subtitle="Hairlines + surface layers carry depth — no drop shadows." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px 26px; font-family: var(--font-sans); background: var(--bg); display: flex; gap: 26px; align-items: center; }
  .stack { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; width: 250px; }
  .stack h5 { font-size: var(--text-sm); font-weight: 600; color: var(--fg); margin-bottom: 10px; }
  .nested { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px; font-size: var(--text-sm); color: var(--fg-muted); }
  .note { font-size: var(--text-sm); color: var(--fg-subtle); line-height: var(--leading-normal); max-width: 320px; }
  .note code { background: var(--surface-2); padding: 1px 5px; border-radius: var(--radius-xs); font-size: 11px; color: var(--accent-text); }
  .strong { border-color: var(--border-strong) !important; }
</style>
</head>
<body>
  <div class="stack">
    <h5>Card on --surface</h5>
    <div class="nested">Nested on --surface-2, hairline <code>--border</code></div>
  </div>
  <p class="note">Elevation reads through <b>layered surfaces</b> and <code>--border</code> / <code>--border-strong</code> hairlines. Shadows are reserved for floating overlays only.</p>
</body>
</html>
