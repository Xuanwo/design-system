  .topbar { position: sticky; top: 0; z-index: 100; background: color-mix(in srgb, var(--bg) 82%, transparent); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
  .topbar__inner { max-width: 1024px; margin: 0 auto; height: 56px; padding: 0 var(--space-5); display: flex; align-items: center; gap: var(--space-4); }
  .shell { max-width: 1024px; margin: 0 auto; display: grid; grid-template-columns: minmax(0, 1fr) 232px; gap: var(--space-7); padding: 0 var(--space-5) var(--space-7); }

  .prose { font-family: var(--font-reading); color: var(--fg); font-size: var(--text-lg); line-height: var(--leading-relaxed); padding: var(--space-6) 0 0; max-width: 700px; margin: 0 auto; }

  .prose h2 { font-family: var(--font-heading); font-size: var(--text-2xl); font-weight: 600; letter-spacing: var(--tracking-snug); margin: var(--space-7) var(--space-5) var(--space-3); scroll-margin-top: 80px; }

  .prose a { color: var(--accent-text); text-decoration: underline; text-underline-offset: 0.15em; text-decoration-color: var(--accent-border); }

<script type="text/babel">
const { Logo, IconButton } = window.XuanwoDesignSystem_8e9a9d;

function TopBar() {
  const Icon = window.Icon;
  const [theme, setTheme] = React.useState(() => document.documentElement.dataset.theme || "light");
  const toggle = () => { const n = theme === "dark" ? "light" : "dark"; document.documentElement.dataset.theme = n; try { localStorage.setItem("xw-theme", n); } catch(e){} setTheme(n); };
  return (
    <div className="topbar"><div className="topbar__inner">
      <Logo height={24} src="../../assets/logo/wordmark.png" />
      <div style={{ marginLeft: "auto", display: "flex", gap: 4 }}>
        <IconButton label="Search">{Icon.search()}</IconButton>
        <IconButton label="Toggle theme" onClick={toggle}>{theme === "dark" ? Icon.sun() : Icon.moon()}</IconButton>
      </div>
    </div></div>
  );
}

function App() {
  const { ArticleHeader, ArticleBody, TableOfContents, ArticleFooter } = window;
  return (
    <React.Fragment>
      <TopBar />
      <div className="shell">
        <div className="main">
          <ArticleHeader />
          <ArticleBody />
          <ArticleFooter />
        </div>
        <TableOfContents />
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
